---
AllCops:
  Exclude:
    - 'bin/**/*'
    - 'assets/**/*'
    - 'vendor/**/**'
  DisplayCopNames: true
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  NewCops: enable
plugins:
  - rubocop-rake
  - rubocop-minitest
  - rubocop-performance
  - rubocop-elegant
Gemspec/RequiredRubyVersion:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Layout/EndOfLine:
  EnforcedStyle: lf
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Style/OptionalBooleanParameter:
  Enabled: false
Minitest/EmptyLineBeforeAssertionMethods:
  Enabled: false
Elegant/ClassInModule:
  Exclude:
    - 'lib/**/*'
    - '**/test_*.rb'
    - '**/*Test.rb'
Elegant/GoodMethodName:
  AllowedNames:
    - 'method_missing'
    - 'respond_to?'
    - 'respond_to_missing?'
Elegant/NoRedundantVariable:
  Exclude:
    - 'test/**/*'
Style/RequireOrder:
  Exclude:
    - 'Rakefile'
